name: Build & Deploy Dev

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            malindamalshan/marzban-dashboard:dev
            malindamalshan/marzban-dashboard:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: DOMAIN_NAME,HTTPS_PORT,OPTIMIZE_INTERVAL,ADMIN_USER,ADMIN_PASSWORD
          script: |
            # ================================
            # 1. Export Variables
            # ================================
            export DOMAIN_NAME="${{ vars.DOMAIN_NAME }}"
            export HTTPS_PORT="${{ vars.HTTPS_PORT }}"
            export OPTIMIZE_INTERVAL="${{ vars.OPTIMIZE_INTERVAL }}"
            export ADMIN_USER="${{ secrets.ADMIN_USER }}"
            export ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"

            # ================================
            # 2. Prepare Server Directory
            # ================================
            mkdir -p ~/marz-x-source
            cd ~/marz-x-source
            
            if [ ! -d ".git" ]; then
              git clone https://github.com/wmm-x/marz-x.git .
            fi
            git fetch origin main
            git reset --hard origin/main

            # ================================
            # 3. Fix APT lock issues
            # ================================
            sudo killall apt apt-get 2>/dev/null || true
            sudo rm -f /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock

            # ================================
            # 4. Run your existing setup (optional)
            # ================================
            chmod +x automade.sh
            sudo -E bash ./automade.sh

            # ================================
            # 5. Pull latest Docker image
            # ================================
            sudo docker pull malindamalshan/marzban-dashboard:dev

            # ================================
            # 6. Stop & remove old container
            # ================================
            sudo docker stop marzban-dashboard || true
            sudo docker rm marzban-dashboard || true

            # ================================
            # 7. Run new container
            # ================================
            sudo docker run -d \
              --name marzban-dashboard \
              -p 3000:3000 \
              -e DOMAIN_NAME="$DOMAIN_NAME" \
              -e HTTPS_PORT="$HTTPS_PORT" \
              -e OPTIMIZE_INTERVAL="$OPTIMIZE_INTERVAL" \
              -e ADMIN_USER="$ADMIN_USER" \
              -e ADMIN_PASSWORD="$ADMIN_PASSWORD" \
              malindamalshan/marzban-dashboard:dev

            # ================================
            # 8. Cleanup old images
            # ================================
            sudo docker image prune -f
